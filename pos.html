<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cashier POS — Dastarkhwan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F5D50">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">D</div>
      <div><div class="brand-name" id="r-name">Loading…</div><div class="brand-tag">Cashier POS</div></div>
    </div>
    <div class="nav-links"></div>
    <button class="bell-btn" id="bell-btn" style="display:none;" title="Mute/unmute call alerts">&#128276;</button>
    <div class="staff-badge" id="staff-badge" style="display:none;"></div>
  </div>

  <div id="loading" class="loading-msg">Loading menu…</div>

  <div id="pin-gate" class="pin-gate" style="display:none;">
    <h2>Staff sign-in</h2>
    <p>Enter your password to open the till</p>
    <input type="password" id="password-input" class="password-input" placeholder="Password" autocomplete="off">
    <button class="btn-primary" id="btn-login">Sign in</button>
    <div class="pin-error" id="pin-error"></div>
  </div>

  <div id="pos-root" class="pos-shell" style="display:none;">
    <div>
      <div class="panel card" id="calls-panel" style="display:none; margin-bottom:16px; border-color:var(--danger);">
        <h4 style="color:var(--danger);">&#128276; Tables calling for service</h4>
        <div id="table-calls"></div>
      </div>
      <div class="pos-cats" id="pos-cats"></div>
      <div class="pos-grid" id="pos-grid"></div>
      <div class="panel card" style="margin-top:16px;">
        <h4 style="display:flex; justify-content:space-between; align-items:center;">
          Incoming orders <span class="muted" style="font-weight:400; font-size:11px;">updates every 6s</span>
        </h4>
        <div id="incoming-orders"></div>
      </div>
    </div>
    <div class="pos-order">
      <h3 id="order-panel-heading">New order</h3>
      <div class="edit-banner" id="edit-banner" style="display:none;">
        Editing an existing order — changes replace its current items.
        <button id="btn-cancel-edit">Cancel</button>
      </div>
      <select class="table-select" id="table-select"></select>
      <div class="order-lines" id="order-lines"></div>
      <div class="order-totals" id="order-totals"></div>
      <div class="pay-select" id="pay-select">
        <button class="active" data-method="cash">Cash</button>
        <button data-method="card">Card</button>
        <button data-method="wallet">Wallet</button>
      </div>
      <button class="btn-primary" id="btn-print" disabled>Print receipt &amp; close order</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">Order saved and closed</div>
<div class="call-popup-wrap" id="call-popup-wrap"></div>

<div id="receipt-print-area" class="receipt-print-area"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script>
let menu = [];
let posCat = 0;
let order = [];
let payMethod = "cash";
let tables = [];
let loggedInStaff = null;
let editingOrderId = null; // set when the cart panel is editing an existing order instead of building a new one
const fmt = (n) => `${CURRENT_RESTAURANT.currency} ${Math.round(n).toLocaleString()}`;

async function init() {
  const r = await loadRestaurant();
  if (!r) {
    document.getElementById("loading").innerHTML =
      `Could not connect. Check that js/config.js has your real Supabase URL and anon key, and that schema.sql has been run.`;
    document.getElementById("loading").classList.add("error-msg");
    return;
  }
  document.getElementById("r-name").textContent = r.name;
  menu = await loadFullMenu(r.id);

  const { data: tableRows } = await supa.from("restaurant_tables").select("*").eq("restaurant_id", r.id);
  tables = tableRows || [];
  const sel = document.getElementById("table-select");
  sel.innerHTML = tables.map((t) => `<option value="${t.id}">${t.label}</option>`).join("");

  document.getElementById("loading").style.display = "none";
  document.getElementById("pin-gate").style.display = "block";
  document.getElementById("password-input").focus();
}

async function attemptLogin() {
  unlockAudio();
  const input = document.getElementById("password-input");
  const password = input.value;
  document.getElementById("pin-error").textContent = "";
  if (!password) return;

  const staff = await checkStaffPassword(CURRENT_RESTAURANT.id, password, ["owner", "manager", "cashier", "waiter"]);
  if (staff) {
    loggedInStaff = staff;
    document.getElementById("pin-gate").style.display = "none";
    document.getElementById("pos-root").style.display = "grid";
    const badge = document.getElementById("staff-badge");
    badge.style.display = "flex";
    badge.innerHTML = `Signed in as <strong>${staff.name}</strong> <button id="btn-logout">Sign out</button>`;
    document.getElementById("btn-logout").onclick = () => window.location.reload();
    applyRolePermissions(staff.role);
    renderCats();
    renderGrid();
    renderOrder();
    pollIncomingOrders();
    setInterval(pollIncomingOrders, 6000);
    document.getElementById("bell-btn").style.display = "block";
    updateBellIcon();
    pollTableCalls();
    setInterval(pollTableCalls, 5000);
  } else {
    document.getElementById("pin-error").textContent = "Incorrect password — ask your manager if you don't have one yet.";
    input.value = "";
    input.focus();
  }
}

document.getElementById("btn-login").addEventListener("click", attemptLogin);
document.getElementById("password-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") attemptLogin();
});

function printReceipt({ tableLabel, orderId, items, subtotal, tax, total, paymentMethod }) {
  const dateStr = new Date().toLocaleString();
  const shortId = orderId ? orderId.slice(0, 8) : "";
  const itemRows = items.map((l) =>
    `<div class="r-item-row"><span class="r-item-name">${l.qty}x ${l.name}</span><span>${fmt(l.price * l.qty)}</span></div>`
  ).join("");

  document.getElementById("receipt-print-area").innerHTML = `
    <div class="r-header">
      <div class="r-name">${CURRENT_RESTAURANT.name}</div>
      <div class="r-meta">${tableLabel || "Takeaway"}</div>
      <div class="r-meta">${dateStr}${shortId ? " · #" + shortId : ""}</div>
    </div>
    <div class="r-line"></div>
    ${itemRows}
    <div class="r-line"></div>
    <div class="r-totals">
      <div class="r-item-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
      <div class="r-item-row"><span>Tax</span><span>${fmt(tax)}</span></div>
      <div class="r-item-row r-grand"><span>Total</span><span>${fmt(total)}</span></div>
      ${paymentMethod ? `<div class="r-item-row"><span>Paid via</span><span style="text-transform:capitalize;">${paymentMethod}</span></div>` : ""}
    </div>
    <div class="r-footer">Thank you for dining with us!</div>`;

  window.print();
}

// Browsers (and mobile webviews) block sound until the page has had a
// real tap/click — a fresh AudioContext created later, with no prior
// interaction, stays silently "suspended" forever. So we create ONE
// context and unlock it the moment the user first taps anything (the
// PIN pad, guaranteed to happen before any bell could ring), then
// reuse that same unlocked context for every beep afterward.
let audioCtx = null;
function unlockAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    } catch (e) { /* Web Audio not available on this device — ring just won't play */ }
  }
  // Ask for permission to show OS-level notifications (these are what let
  // the alert surface — and vibrate the phone — even if the browser tab
  // is in the background or the screen is locked).
  if (window.Notification && Notification.permission === "default") {
    Notification.requestPermission().catch(() => {});
  }
}

// A long, LOUD "ding-dong ding-dong…" ring — seven chime pairs back to
// back (~7 seconds total) at a much higher gain than before, so it
// carries across a noisy restaurant floor instead of blending in.
function playRingtone() {
  if (!audioCtx) return;
  if (audioCtx.state === "suspended") audioCtx.resume();
  try {
    const now = audioCtx.currentTime;
    const cycles = 7;
    const cycleLength = 0.95; // seconds between the start of each ding-dong
    for (let i = 0; i < cycles; i++) {
      const base = now + i * cycleLength;
      [[988, 0], [740, 0.3]].forEach(([freq, offset]) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const start = base + offset;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.85, start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.32);
        osc.start(start);
        osc.stop(start + 0.34);
      });
    }
  } catch (e) { /* fine — visual + vibration alerts still show even if sound fails */ }
  // Buzz the phone too, in the same rhythm as the chime, extended to
  // match the longer ring — this is what makes the alert register on
  // mobile even if the ringer is silenced or the tab is backgrounded.
  if (navigator.vibrate) {
    navigator.vibrate([400, 260, 400, 260, 400, 260, 400, 260, 400, 260, 400, 260, 400]);
  }
}

// On-screen banner in the corner of the screen, plus (when permitted) a
// real OS notification so the alert still reaches the staff member if
// they've switched away from this tab or their phone is locked.
function showCallPopup(call) {
  const wrap = document.getElementById("call-popup-wrap");
  const label = call.table_label || "A table";
  const el = document.createElement("div");
  el.className = "call-popup";
  el.innerHTML = `
    <div class="cp-icon">&#128276;</div>
    <div>
      <div class="cp-title">${label} is calling!</div>
      <div class="cp-sub">${call.urgent ? "Urgent — rung " + call.call_count + "x" : "Needs assistance"}</div>
    </div>
    <button class="cp-close" title="Dismiss">&times;</button>`;
  el.querySelector(".cp-close").onclick = () => el.remove();
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 8000);

  if (window.Notification && Notification.permission === "granted") {
    try {
      const n = new Notification(`${label} is calling!`, {
        body: call.urgent ? `Urgent — rung ${call.call_count}x` : "Needs assistance",
        icon: "icons/icon-192.png",
        tag: `table-call-${call.table_id}`,
        vibrate: [400, 260, 400, 260, 400, 260, 400],
      });
      n.onclick = () => { window.focus(); n.close(); };
    } catch (e) { /* notification failed to show — banner above still covers it */ }
  }
}

function isBellMuted() {
  return localStorage.getItem("dastarkhwan_bell_muted") === "true";
}
function updateBellIcon(ringing) {
  const btn = document.getElementById("bell-btn");
  btn.textContent = isBellMuted() ? "\u{1F515}" : "\u{1F514}";
  btn.classList.toggle("ringing", !!ringing && !isBellMuted());
}
document.getElementById("bell-btn").addEventListener("click", () => {
  unlockAudio();
  localStorage.setItem("dastarkhwan_bell_muted", (!isBellMuted()).toString());
  updateBellIcon();
});

let knownCalls = new Map(); // table_id -> call_count, so we can tell which table just rang
async function pollTableCalls() {
  const calls = await getActiveCalls(CURRENT_RESTAURANT.id);
  const panel = document.getElementById("calls-panel");
  const wrap = document.getElementById("table-calls");

  if (!calls.length) {
    panel.style.display = "none";
    knownCalls.clear();
    updateBellIcon(false);
    return;
  }

  panel.style.display = "block";

  // A table counts as "newly ringing" if it wasn't calling before, or its
  // call_count just went up (they pressed the bell again).
  const newlyRinging = [];
  calls.forEach((c) => {
    const prevCount = knownCalls.get(c.table_id) || 0;
    if (Number(c.call_count) > prevCount) newlyRinging.push(c);
    knownCalls.set(c.table_id, Number(c.call_count));
  });
  const stillCallingIds = new Set(calls.map((c) => c.table_id));
  for (const id of knownCalls.keys()) {
    if (!stillCallingIds.has(id)) knownCalls.delete(id);
  }

  if (newlyRinging.length && !isBellMuted()) {
    playRingtone();
    newlyRinging.forEach(showCallPopup);
  }
  updateBellIcon(true);

  wrap.innerHTML = calls.map((c) => `
    <div class="order-line" style="margin-bottom:8px; ${c.urgent ? "border-color:var(--danger);" : ""}">
      <div>
        <div class="l-name">${c.table_label || "Table"} ${c.urgent ? '<span style="color:var(--danger);">· urgent, rung ' + c.call_count + 'x</span>' : ""}</div>
        <div class="l-qty">Called ${c.call_count}x, since ${new Date(c.first_called_at).toLocaleTimeString()}</div>
      </div>
      <button class="btn-mini" data-table="${c.table_id}">On my way</button>
    </div>`).join("");

  wrap.querySelectorAll("button").forEach((btn) => {
    btn.onclick = async () => {
      await acknowledgeCalls(btn.dataset.table, loggedInStaff ? loggedInStaff.id : null);
      pollTableCalls();
    };
  });
}

async function pollIncomingOrders() {
  const orders = await getOpenOrders(CURRENT_RESTAURANT.id);
  const wrap = document.getElementById("incoming-orders");
  if (!orders.length) {
    wrap.innerHTML = `<div class="muted" style="font-size:12.5px;">No open orders right now.</div>`;
    return;
  }
  wrap.innerHTML = "";
  orders.forEach((o) => {
    const itemsText = (o.items || []).map((i) => `${i.qty}x ${i.name}`).join(", ");
    const row = document.createElement("div");
    row.className = "order-line";
    row.style.marginBottom = "8px";
    const sourceLabel = o.source === "qr" ? "QR order" : "POS";
    const nextAction = o.status === "open" ? "preparing" : o.status === "preparing" ? "ready" : "closed";
    const nextLabel = o.status === "open" ? "Start preparing" : o.status === "preparing" ? "Mark ready" : "Close & print receipt";
    const waiterBlocked = isWaiterMode && nextAction === "closed";
    const nextActionHtml = waiterBlocked
      ? `<span class="muted" style="font-size:11px;">Ask cashier to close</span>`
      : `<button class="btn-mini" data-action="advance" data-next="${nextAction}">${nextLabel}</button>`;
    // Editing items is open to any signed-in role (fixing a mistake
    // shouldn't need a manager). Voiding an order is restricted the
    // same way closing/payment is — a waiter can't cancel an order
    // outright, only cashier/manager/owner can.
    const editHtml = `<button class="btn-mini" data-action="edit">Edit</button>`;
    const voidHtml = isWaiterMode ? "" : `<button class="btn-mini btn-void" data-action="void">Void</button>`;

    row.innerHTML = `<div>
        <div class="l-name">${o.table_label || "Takeaway"} · ${sourceLabel} · <span style="text-transform:capitalize;">${o.status}</span></div>
        <div class="l-qty">${itemsText}</div>
      </div>
      <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; justify-content:flex-end;">
        <span class="mono" style="font-size:12px;">${fmt(o.total)}</span>
        ${editHtml}
        ${voidHtml}
        ${nextActionHtml}
      </div>`;

    const advanceBtn = row.querySelector('[data-action="advance"]');
    if (advanceBtn) {
      advanceBtn.onclick = async () => {
        await updateOrderStatus(o.id, nextAction, nextAction === "closed" ? "cash" : null);
        if (nextAction === "closed") {
          printReceipt({
            tableLabel: o.table_label,
            orderId: o.id,
            items: o.items || [],
            subtotal: o.subtotal,
            tax: o.tax,
            total: o.total,
            paymentMethod: "cash",
          });
        }
        pollIncomingOrders();
      };
    }

    row.querySelector('[data-action="edit"]').onclick = () => startEditOrder(o);

    const voidBtn = row.querySelector('[data-action="void"]');
    if (voidBtn) {
      voidBtn.onclick = async () => {
        if (!confirm(`Void this order (${o.table_label || "Takeaway"}, ${fmt(o.total)})? This cancels it — it won't be counted as a sale, but stays in the record as voided.`)) return;
        await voidOrder(o.id);
        if (editingOrderId === o.id) cancelEditOrder();
        pollIncomingOrders();
      };
    }

    wrap.appendChild(row);
  });
}

let isWaiterMode = false;

function applyRolePermissions(role) {
  isWaiterMode = role === "waiter";
  const paySelect = document.getElementById("pay-select");
  const printBtn = document.getElementById("btn-print");
  if (isWaiterMode) {
    paySelect.style.display = "none";
    printBtn.textContent = "Send to kitchen";
  } else {
    paySelect.style.display = "flex";
    printBtn.textContent = "Print receipt & close order";
  }
}

function renderCats() {
  const wrap = document.getElementById("pos-cats");
  wrap.innerHTML = "";
  menu.forEach((c, i) => {
    const b = document.createElement("button");
    b.textContent = c.name;
    if (i === posCat) b.classList.add("active");
    b.onclick = () => { posCat = i; renderCats(); renderGrid(); };
    wrap.appendChild(b);
  });
}

// Every cashier/waiter/owner/manager who's signed into the POS can flip
// a dish's availability — tap the small dot in the corner of its card.
// Unavailable items gray out, show an "Out of stock" badge, and can no
// longer be added to an order from here; the customer QR menu picks up
// the change automatically the next time it polls (loadMenu filters on
// is_available).
function renderGrid() {
  const wrap = document.getElementById("pos-grid");
  wrap.innerHTML = "";
  (menu[posCat]?.items || []).forEach((item) => {
    const card = document.createElement("div");
    card.className = "pos-item" + (item.is_available === false ? " unavailable" : "");
    card.setAttribute("role", "button");
    const imgHtml = item.image_url
      ? `<img src="${item.image_url}" alt="" class="pi-photo" loading="lazy" onerror="this.style.display='none'">`
      : "";
    const outBadge = item.is_available === false ? `<div class="pi-out-badge">Out of stock</div>` : "";
    card.innerHTML = `${outBadge}<button class="pi-toggle" title="${item.is_available === false ? "Mark back in stock" : "Mark out of stock"}">${item.is_available === false ? "&#8635;" : "&#10005;"}</button>
      ${imgHtml}<div class="name">${item.name}</div><div class="price">${fmt(item.price)}</div>`;
    card.querySelector(".pi-toggle").onclick = async (e) => {
      e.stopPropagation();
      const btn = e.currentTarget;
      btn.disabled = true;
      const nextAvailable = item.is_available === false;
      const result = await setItemAvailability(item.id, nextAvailable);
      if (result) {
        item.is_available = result.is_available;
        renderGrid();
      } else {
        btn.disabled = false;
      }
    };
    card.addEventListener("click", () => {
      if (item.is_available === false) return;
      addItem(item);
    });
    wrap.appendChild(card);
  });
}

function addItem(item) {
  const line = order.find((l) => l.id === item.id);
  if (line) line.qty++;
  else order.push({ id: item.id, name: item.name, price: item.price, qty: 1 });
  renderOrder();
}

function removeLine(id) {
  order = order.filter((l) => l.id !== id);
  renderOrder();
}

function renderOrder() {
  const wrap = document.getElementById("order-lines");
  const totalsWrap = document.getElementById("order-totals");
  const printBtn = document.getElementById("btn-print");
  printBtn.textContent = editingOrderId ? "Save changes to order" : (isWaiterMode ? "Send to kitchen" : "Print receipt & close order");
  if (order.length === 0) {
    wrap.innerHTML = `<div class="muted" style="text-align:center; padding:30px 10px; font-size:13px;">Tap items to add them to the order</div>`;
    totalsWrap.innerHTML = "";
    printBtn.disabled = true;
    return;
  }
  wrap.innerHTML = "";
  order.forEach((l) => {
    const row = document.createElement("div");
    row.className = "order-line";
    row.innerHTML = `<div><div class="l-name">${l.name}</div><div class="l-qty">Qty ${l.qty}</div></div>
      <div style="display:flex; align-items:center;"><span class="mono" style="font-size:12.5px;">${fmt(l.price * l.qty)}</span>
      <button class="l-remove">&times;</button></div>`;
    row.querySelector(".l-remove").onclick = () => removeLine(l.id);
    wrap.appendChild(row);
  });
  const subtotal = order.reduce((s, l) => s + l.price * l.qty, 0);
  const tax = Math.round(subtotal * CURRENT_RESTAURANT.tax_rate);
  totalsWrap.innerHTML = `
    <div class="tot-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
    <div class="tot-row"><span>Tax (${Math.round(CURRENT_RESTAURANT.tax_rate * 100)}%)</span><span>${fmt(tax)}</span></div>
    <div class="tot-row grand"><span>Total</span><span>${fmt(subtotal + tax)}</span></div>`;
  printBtn.disabled = false;
}

function startEditOrder(o) {
  editingOrderId = o.id;
  order = (o.items || []).map((it, i) => ({
    id: it.menu_item_id || `legacy-${i}`,
    name: it.name,
    price: it.price,
    qty: it.qty,
  }));
  document.getElementById("order-panel-heading").textContent = `Editing ${o.table_label || "Takeaway"}`;
  document.getElementById("edit-banner").style.display = "flex";
  document.getElementById("table-select").style.display = "none";
  document.getElementById("pay-select").style.display = "none";
  renderOrder();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelEditOrder() {
  editingOrderId = null;
  order = [];
  document.getElementById("order-panel-heading").textContent = "New order";
  document.getElementById("edit-banner").style.display = "none";
  document.getElementById("table-select").style.display = "";
  document.getElementById("pay-select").style.display = isWaiterMode ? "none" : "flex";
  renderOrder();
}
document.getElementById("btn-cancel-edit").addEventListener("click", cancelEditOrder);

document.getElementById("pay-select").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#pay-select button").forEach((b) => b.classList.remove("active"));
  e.target.classList.add("active");
  payMethod = e.target.dataset.method;
});

document.getElementById("btn-print").addEventListener("click", async () => {
  if (editingOrderId) {
    const result = await updateOrderItems(editingOrderId, order);
    const toast = document.getElementById("toast");
    if (result) {
      toast.textContent = "Order updated";
      cancelEditOrder();
      pollIncomingOrders();
    } else {
      toast.textContent = "Couldn't save changes — order may have already been closed";
    }
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
    return;
  }

  const tableId = document.getElementById("table-select").value;
  const tableLabel = (tables.find((t) => t.id === tableId) || {}).label;
  const created = await createOrder({
    restaurantId: CURRENT_RESTAURANT.id,
    tableId,
    source: "pos",
    cart: order,
    staffId: loggedInStaff ? loggedInStaff.id : null,
  });
  if (created) {
    const toast = document.getElementById("toast");
    if (isWaiterMode) {
      // Waiters send the order to the kitchen — it stays "open" and shows
      // up in the incoming-orders queue for a cashier to handle payment
      // and printing later. No payment is taken here.
      toast.textContent = "Sent to kitchen";
    } else {
      await updateOrderStatus(created.id, "closed", payMethod);
      printReceipt({
        tableLabel,
        orderId: created.id,
        items: order,
        subtotal: created.subtotal,
        tax: created.tax,
        total: created.total,
        paymentMethod: payMethod,
      });
      toast.textContent = "Order saved and closed";
    }
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
    order = [];
    renderOrder();
    pollIncomingOrders();
  }
});

init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
</body>
</html>
