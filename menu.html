<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order — Dastarkhwan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app menu-shell">
  <div id="loading" class="loading-msg">Loading menu…</div>
  <div id="menu-root" style="display:none;"></div>
</div>
<div class="toast" id="call-toast">Waiter has been called</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script>
// ---------------------------------------------------------------------
// Global state
// ---------------------------------------------------------------------
let menu = [];             // categories -> items (available items only)
let menuCat = 0;
let cart = [];
let currentTable = null;
let cartDetailOpen = false;
let addonMode = false;     // true when adding items to an already-placed order
let addonOrderId = null;   // the order we're adding items to
let availabilityTimer = null;

const deviceId = getDeviceId();
const fmt = (n) => `${CURRENT_RESTAURANT.currency} ${Math.round(n).toLocaleString()}`;
const root = () => document.getElementById("menu-root");

function getTableTokenFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get("t"); // e.g. menu.html?t=zg-t4
}

function clearTimers() {
  if (availabilityTimer) { clearInterval(availabilityTimer); availabilityTimer = null; }
  stopGamePolling();
  if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
  if (factTimer) { clearInterval(factTimer); factTimer = null; }
}

function headerHtml() {
  return `
    <div class="menu-header">
      <div class="r-name" id="r-name">${CURRENT_RESTAURANT.name}</div>
      <div class="r-table" id="r-table">${currentTable ? `${currentTable.label} · Dine-in` : "Takeaway order"}</div>
      <button class="call-waiter-btn" id="btn-call-waiter">&#128276; Call waiter</button>
    </div>`;
}

async function init() {
  const r = await loadRestaurant();
  if (!r) {
    document.getElementById("loading").innerHTML =
      `Could not connect. Check js/config.js has your real Supabase URL and anon key.`;
    document.getElementById("loading").classList.add("error-msg");
    return;
  }

  const token = getTableTokenFromUrl();
  if (token) {
    const { data: table } = await supa
      .from("restaurant_tables")
      .select("*")
      .eq("restaurant_id", r.id)
      .eq("qr_token", token)
      .maybeSingle();
    currentTable = table || null;
  }

  document.getElementById("loading").style.display = "none";
  root().style.display = "block";

  // If this table already has an order in progress, let the customer
  // choose: add more items to it, or jump to the waiting page — rather
  // than silently deciding for them.
  if (currentTable) {
    const active = await getActiveOrderForTable(currentTable.id);
    if (active) {
      renderRescanChoice(active);
      return;
    }
  }

  await loadFreshMenu();
  renderMenuScreen();
}

async function loadFreshMenu() {
  menu = await loadMenu(CURRENT_RESTAURANT.id);
}

// ---------------------------------------------------------------------
// Screen: rescan choice ("add to my order" vs "view my order")
// ---------------------------------------------------------------------
function renderRescanChoice(activeOrder) {
  clearTimers();
  root().innerHTML = `
    ${headerHtml()}
    <div class="rc-wrap">
      <div class="rc-icon">&#128522;</div>
      <h4>Welcome back!</h4>
      <div class="rc-total">${currentTable.label} · current order total ${fmt(activeOrder.total)}</div>
      <div class="rc-actions">
        <button class="rc-btn rc-btn-add" id="btn-rc-add">+ Add more items to my order</button>
        <button class="rc-btn rc-btn-view" id="btn-rc-view">View my order &amp; wait time</button>
      </div>
    </div>`;
  wireCallWaiterButton("btn-call-waiter");

  document.getElementById("btn-rc-add").addEventListener("click", async () => {
    addonMode = true;
    addonOrderId = activeOrder.id;
    cart = [];
    await loadFreshMenu();
    renderMenuScreen();
  });
  document.getElementById("btn-rc-view").addEventListener("click", () => {
    renderOrderConfirmation(activeOrder, activeOrder.items || [], { isAddon: false, freshlyPlaced: false });
  });
}

// ---------------------------------------------------------------------
// Screen: menu browsing + cart
// ---------------------------------------------------------------------
function renderMenuScreen() {
  clearTimers();
  root().innerHTML = `
    ${headerHtml()}
    ${addonMode ? `<div class="addon-banner">Adding items to your existing order at ${currentTable.label}</div>` : ""}
    <div class="menu-cats" id="menu-cats"></div>
    <div class="menu-list" id="menu-list"></div>

    <div class="cart-bar" id="cart-bar" style="display:none;">
      <span><span class="cb-count" id="cart-count">0</span>View order</span>
      <span id="cart-total"></span>
    </div>
    <div class="cart-detail" id="cart-detail" style="display:none;"></div>

    <div class="checkout-form" id="checkout-form" style="display:none;">
      ${addonMode ? "" : `
        <label style="font-weight:600; color:var(--ink); margin-bottom:6px; display:block;">Your phone number (optional)</label>
        <input type="tel" id="phone-input" placeholder="03XX XXXXXXX">
        <label><input type="checkbox" id="opt-in" checked> Keep me updated with occasional offers</label>`}
      <button class="btn-primary" id="btn-place-order">${addonMode ? "Add to my order" : "Place order"}</button>
    </div>`;

  wireCallWaiterButton("btn-call-waiter");
  menuCat = 0;
  renderCats();
  renderList();
  renderCartBar();

  document.getElementById("cart-bar").addEventListener("click", () => {
    cartDetailOpen = !cartDetailOpen;
    if (cartDetailOpen) renderCartDetail();
    else document.getElementById("cart-detail").style.display = "none";
  });

  document.getElementById("btn-place-order").addEventListener("click", handlePlaceOrder);

  // Live availability: staff can 86 a dish any time. Poll every 15s
  // while the customer is browsing so the menu never shows something
  // that just went out of stock, and quietly drop it from the cart if
  // it does (with a heads-up) rather than letting them order it.
  availabilityTimer = setInterval(refreshAvailability, 15000);
}

async function refreshAvailability() {
  const fresh = await loadMenu(CURRENT_RESTAURANT.id);
  menu = fresh;
  const availableIds = new Set(menu.flatMap((c) => c.items).map((i) => i.id));
  const removed = cart.filter((l) => !availableIds.has(l.id));
  if (removed.length) {
    cart = cart.filter((l) => availableIds.has(l.id));
    alert(`Sorry — ${removed.map((l) => l.name).join(", ")} just sold out and ${removed.length > 1 ? "were" : "was"} removed from your order.`);
  }
  if (menuCat >= menu.length) menuCat = 0;
  renderCats();
  renderList();
  renderCartBar();
  if (cartDetailOpen) renderCartDetail();
}

function renderCats() {
  const wrap = document.getElementById("menu-cats");
  if (!wrap) return;
  wrap.innerHTML = "";
  menu.forEach((c, i) => {
    const b = document.createElement("button");
    b.textContent = c.name;
    if (i === menuCat) b.classList.add("active");
    b.onclick = () => { menuCat = i; renderCats(); renderList(); };
    wrap.appendChild(b);
  });
}

function renderList() {
  const wrap = document.getElementById("menu-list");
  if (!wrap) return;
  wrap.innerHTML = "";
  (menu[menuCat]?.items || []).forEach((item) => {
    const row = document.createElement("div");
    row.className = "menu-card";
    const imgHtml = item.image_url
      ? `<img src="${item.image_url}" alt="" class="mc-photo" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="mc-photo mc-photo-empty"></div>`;
    row.innerHTML = `${imgHtml}<div class="mc-info"><div class="mc-name">${item.name}</div><div class="mc-price">${fmt(item.price)}</div></div>
      <button class="mc-add">+</button>`;
    row.querySelector(".mc-add").onclick = () => addToCart(item);
    wrap.appendChild(row);
  });
}

function addToCart(item) {
  const line = cart.find((l) => l.id === item.id);
  if (line) line.qty++;
  else cart.push({ id: item.id, name: item.name, price: item.price, qty: 1 });
  renderCartBar();
  if (cartDetailOpen) renderCartDetail();
}

function changeQty(itemId, delta) {
  const line = cart.find((l) => l.id === itemId);
  if (!line) return;
  line.qty += delta;
  if (line.qty <= 0) cart = cart.filter((l) => l.id !== itemId);
  renderCartBar();
  renderCartDetail();
}

function renderCartBar() {
  const bar = document.getElementById("cart-bar");
  const form = document.getElementById("checkout-form");
  const detail = document.getElementById("cart-detail");
  if (!bar) return;
  const count = cart.reduce((s, l) => s + l.qty, 0);
  if (count === 0) {
    bar.style.display = "none";
    form.style.display = "none";
    detail.style.display = "none";
    cartDetailOpen = false;
    return;
  }
  bar.style.display = "flex";
  form.style.display = "block";
  document.getElementById("cart-count").textContent = count;
  document.getElementById("cart-total").textContent = fmt(cart.reduce((s, l) => s + l.price * l.qty, 0));
}

function renderCartDetail() {
  const detail = document.getElementById("cart-detail");
  if (!detail) return;
  if (cart.length === 0) {
    detail.style.display = "none";
    cartDetailOpen = false;
    return;
  }
  detail.style.display = "block";
  detail.innerHTML = cart.map((l) => `
    <div class="cart-line">
      <div class="cart-line-name">${l.name}</div>
      <div class="cart-line-controls">
        <button class="qty-btn" data-id="${l.id}" data-delta="-1">&minus;</button>
        <span class="qty-num">${l.qty}</span>
        <button class="qty-btn" data-id="${l.id}" data-delta="1">+</button>
        <span class="cart-line-price">${fmt(l.price * l.qty)}</span>
        <button class="cart-line-remove" data-id="${l.id}">Remove</button>
      </div>
    </div>`).join("");

  detail.querySelectorAll(".qty-btn").forEach((btn) => {
    btn.onclick = () => changeQty(btn.dataset.id, Number(btn.dataset.delta));
  });
  detail.querySelectorAll(".cart-line-remove").forEach((btn) => {
    btn.onclick = () => {
      cart = cart.filter((l) => l.id !== btn.dataset.id);
      renderCartBar();
      renderCartDetail();
    };
  });
}

function wireCallWaiterButton(btnId) {
  const btn = document.getElementById(btnId);
  if (btn) btn.addEventListener("click", () => callWaiter(btnId));
}

async function callWaiter(btnId) {
  if (!currentTable) return;
  const btn = document.getElementById(btnId);
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  await ringBell(CURRENT_RESTAURANT.id, currentTable.id);
  const toast = document.getElementById("call-toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2200);
  setTimeout(() => { if (btn) btn.disabled = false; }, 15000); // avoid accidental spamming
}

async function handlePlaceOrder() {
  if (cart.length === 0) return;
  const btn = document.getElementById("btn-place-order");
  btn.disabled = true;

  if (addonMode) {
    btn.textContent = "Adding…";
    const result = await addItemsToOrder(addonOrderId, cart);
    if (!result) {
      btn.disabled = false;
      btn.textContent = "Add to my order";
      alert("Couldn't add those items — please try again or tell the staff.");
      return;
    }
    // Re-fetch the full order (with the merged item list) for the tracker.
    const full = await getActiveOrderForTable(currentTable.id);
    addonMode = false;
    renderOrderConfirmation(full || result, (full && full.items) || cart, { isAddon: true, freshlyPlaced: true });
    return;
  }

  btn.textContent = "Placing order…";
  const phoneEl = document.getElementById("phone-input");
  const optInEl = document.getElementById("opt-in");
  const phone = phoneEl ? phoneEl.value.trim() : "";
  const optIn = optInEl ? optInEl.checked : true;

  const order = await createOrder({
    restaurantId: CURRENT_RESTAURANT.id,
    tableId: currentTable ? currentTable.id : null,
    source: "qr",
    cart,
    customerPhone: phone || null,
    marketingOptIn: optIn,
  });

  if (!order) {
    btn.disabled = false;
    btn.textContent = "Place order";
    alert("Couldn't place the order — please try again or tell the staff.");
    return;
  }

  renderOrderConfirmation(order, cart, { isAddon: false, freshlyPlaced: true });
}

// ---------------------------------------------------------------------
// Screen: order confirmation / waiting page
// ---------------------------------------------------------------------
function renderOrderConfirmation(order, cartItems, opts) {
  clearTimers();
  const { isAddon, freshlyPlaced } = opts || {};
  const grand = order.total;
  const waLink = buildWhatsAppReceiptLink(order, cartItems);
  const heading = isAddon ? "Added to your order" : "Order sent to the kitchen";
  const showGameTab = !!currentTable;

  root().innerHTML = `
    ${headerHtml()}
    <div class="order-confirm">
      <div class="oc-check">&#10003;</div>
      <h4>${heading}</h4>
      <p class="muted" style="margin-bottom:6px;">${currentTable ? currentTable.label : "Takeaway"} · Order total ${fmt(grand)}</p>

      <div class="oc-tracker" id="oc-tracker"></div>

      ${showGameTab ? `
        <div class="oc-tabs">
          <button class="oc-tab active" id="tab-facts">While you wait</button>
          <button class="oc-tab" id="tab-game">&#9917; Goal Rush</button>
        </div>
        <div class="oc-panel active" id="panel-facts">
          <div class="oc-fact-card" id="oc-fact-card"></div>
        </div>
        <div class="oc-panel" id="panel-game">
          <div class="gr-wrap" id="gr-wrap"></div>
        </div>
      ` : `
        <div class="oc-fact-card" id="oc-fact-card" style="margin-top:14px;"></div>
      `}

      <button class="call-waiter-btn oc-call-waiter" id="btn-call-waiter-tracker">&#128276; Call waiter</button>

      ${waLink ? `<a href="${waLink}" target="_blank" rel="noopener" class="oc-wa-btn">
          <span class="oc-wa-icon">&#9993;</span> Get my receipt on WhatsApp
        </a>
        <p class="muted" style="font-size:11px; margin-top:8px;">Opens WhatsApp with your receipt ready to send — one tap.</p>`
      : `<p class="muted" style="font-size:12px; margin-top:16px;">WhatsApp receipts aren't set up for this restaurant yet.</p>`}
    </div>`;

  wireCallWaiterButton("btn-call-waiter-tracker");

  if (showGameTab) {
    document.getElementById("tab-facts").addEventListener("click", () => switchTrackerTab("facts"));
    document.getElementById("tab-game").addEventListener("click", () => switchTrackerTab("game"));
    joinGoalRush(order.id);
  }

  startOrderTracking(order.id, order.status);
  startFactCarousel();
}

function switchTrackerTab(which) {
  document.getElementById("tab-facts").classList.toggle("active", which === "facts");
  document.getElementById("tab-game").classList.toggle("active", which === "game");
  document.getElementById("panel-facts").classList.toggle("active", which === "facts");
  document.getElementById("panel-game").classList.toggle("active", which === "game");
}

const WAIT_FACTS = [
  "Biryani gets its layered flavor from cooking rice and meat separately before combining them — a technique called \"dum.\"",
  "Seekh kebabs are named for the skewer they're grilled on — \"seekh\" literally means skewer.",
  "A good karahi is traditionally cooked in the same wide, thick pan it's served in — that's where the dish gets its name.",
  "Nihari was originally a breakfast dish for Mughal nobility, slow-cooked overnight so it was ready by morning.",
  "Lassi has been a South Asian favorite for centuries — one of the earliest known yogurt-based drinks in the world.",
  "Naan is traditionally baked on the inside wall of a tandoor, not on a flat surface — that's what gives it its char and shape.",
];

let factIndex = 0;
let factTimer = null;
function startFactCarousel() {
  const card = document.getElementById("oc-fact-card");
  if (!card) return;
  const render = () => {
    card.style.opacity = 0;
    setTimeout(() => {
      card.innerHTML = `<div class="oc-fact-label">While you wait</div><div class="oc-fact-text">${WAIT_FACTS[factIndex]}</div>`;
      card.style.opacity = 1;
      factIndex = (factIndex + 1) % WAIT_FACTS.length;
    }, 200);
  };
  render();
  factTimer = setInterval(render, 6000);
}

const STATUS_STEPS = [
  { key: "open", label: "Order received" },
  { key: "preparing", label: "Preparing" },
  { key: "ready", label: "Ready" },
  { key: "closed", label: "Complete" },
];

let statusTimer = null;
function renderTracker(currentStatus) {
  const idx = Math.max(0, STATUS_STEPS.findIndex((s) => s.key === currentStatus));
  const wrap = document.getElementById("oc-tracker");
  if (!wrap) return;
  wrap.innerHTML = STATUS_STEPS.map((s, i) => `
    <div class="oc-step ${i <= idx ? "done" : ""} ${i === idx ? "current" : ""}">
      <div class="oc-dot"></div>
      <div class="oc-step-label">${s.label}</div>
    </div>`).join("");
}

function startOrderTracking(orderId, initialStatus) {
  renderTracker(initialStatus || "open");
  statusTimer = setInterval(async () => {
    const s = await getOrderStatus(orderId);
    if (!s) return;
    renderTracker(s.status);
    if (s.status === "closed") clearInterval(statusTimer);
  }, 4000);
}

// ---------------------------------------------------------------------
// "Goal Rush" — two-player penalty shootout on the waiting page. Both
// customers at the table scan the same QR after ordering; whoever
// joins first is Player 1 (striker for round 1), whoever joins second
// is Player 2. They take turns shooting/saving; the score is shared.
// ---------------------------------------------------------------------
let gameSession = null;
let gamePlayerNum = null;
let gamePollTimer = null;
let gameOrderId = null;
let lastRenderedPhaseKey = null; // avoids re-rendering (and losing button hover state) every poll tick

function stopGamePolling() {
  if (gamePollTimer) { clearInterval(gamePollTimer); gamePollTimer = null; }
  gameSession = null;
  gamePlayerNum = null;
  lastRenderedPhaseKey = null;
}

async function joinGoalRush(orderId) {
  gameOrderId = orderId;
  const s = await gameJoin(currentTable.id, orderId, deviceId);
  if (!s) return;
  gameSession = s;
  gamePlayerNum = s.player1_id === deviceId ? 1 : s.player2_id === deviceId ? 2 : null;
  renderGoalRush();
  gamePollTimer = setInterval(async () => {
    const fresh = await gameState(gameSession.id);
    if (!fresh) return;
    gameSession = fresh;
    renderGoalRush();
  }, 1300);
}

function renderGoalRush() {
  const wrap = document.getElementById("gr-wrap");
  if (!wrap || !gameSession) return;
  const s = gameSession;
  const key = `${s.phase}-${s.round}-${s.shot_zone}-${s.save_zone}-${s.score1}-${s.score2}`;
  if (key === lastRenderedPhaseKey) return;
  lastRenderedPhaseKey = key;

  const youAreStriker = s.turn_striker === gamePlayerNum;
  const scoreLabel = `<div class="gr-score-row">
      <div class="gr-score">${s.score1} <span style="color:#8B8474; font-size:14px;">–</span> ${s.score2}</div>
      <div class="gr-round">Round ${s.round}${gamePlayerNum ? ` · You're Player ${gamePlayerNum}` : ""}</div>
    </div>`;

  if (s.phase === "waiting") {
    wrap.innerHTML = `
      ${scoreLabel}
      <div class="gr-waiting">
        <div class="gr-waiting-icon">&#9917;</div>
        Waiting for a second player…<br>Ask whoever you're dining with to scan this table's QR code too, then tap "Goal Rush" here.
      </div>`;
    return;
  }

  const zones = ["left", "center", "right"];
  const zoneIcon = { left: "&#8592;", center: "&#8226;", right: "&#8594;" };

  if (s.phase === "ready") {
    if (youAreStriker) {
      wrap.innerHTML = `
        ${scoreLabel}
        <div class="gr-status">Your turn — pick a corner to shoot!</div>
        <div class="gr-pitch"><div class="gr-goal">
          ${zones.map((z) => `<button class="gr-zone" data-zone="${z}">${zoneIcon[z]}</button>`).join("")}
        </div></div>`;
      wrap.querySelectorAll(".gr-zone").forEach((btn) => {
        btn.onclick = async () => {
          wrap.querySelectorAll(".gr-zone").forEach((b) => b.disabled = true);
          await gameShoot(gameSession.id, deviceId, btn.dataset.zone);
          lastRenderedPhaseKey = null;
          const fresh = await gameState(gameSession.id);
          if (fresh) { gameSession = fresh; renderGoalRush(); }
        };
      });
    } else {
      wrap.innerHTML = `
        ${scoreLabel}
        <div class="gr-status">Get ready — your opponent is lining up a shot…</div>
        <div class="gr-pitch"><div class="gr-goal">
          ${zones.map((z) => `<button class="gr-zone disabled" disabled>${zoneIcon[z]}</button>`).join("")}
        </div></div>`;
    }
    return;
  }

  if (s.phase === "shot_pending") {
    if (!youAreStriker) {
      wrap.innerHTML = `
        ${scoreLabel}
        <div class="gr-status">Shot's coming — dive to save it!</div>
        <div class="gr-pitch"><div class="gr-goal">
          ${zones.map((z) => `<button class="gr-zone" data-zone="${z}">&#129485;</button>`).join("")}
        </div></div>`;
      wrap.querySelectorAll(".gr-zone").forEach((btn) => {
        btn.onclick = async () => {
          wrap.querySelectorAll(".gr-zone").forEach((b) => b.disabled = true);
          await gameSave(gameSession.id, deviceId, btn.dataset.zone);
          lastRenderedPhaseKey = null;
          const fresh = await gameState(gameSession.id);
          if (fresh) { gameSession = fresh; renderGoalRush(); }
        };
      });
    } else {
      wrap.innerHTML = `
        ${scoreLabel}
        <div class="gr-status">Ball's in the air — waiting for the keeper…</div>
        <div class="gr-pitch"><div class="gr-goal">
          ${zones.map((z) => `<button class="gr-zone ${z === s.shot_zone ? "picked" : "disabled"}" disabled>&#9917;</button>`).join("")}
        </div></div>`;
    }
    return;
  }

  if (s.phase === "resolved") {
    const wasGoal = s.result === "goal";
    const scorerNum = s.turn_striker; // striker of the round that just resolved
    const scorerIsYou = scorerNum === gamePlayerNum;
    let resultText;
    if (wasGoal) resultText = scorerIsYou ? "GOAL! You scored!" : "GOAL! Your opponent scored.";
    else resultText = scorerIsYou ? "Saved! Your shot was stopped." : "Nice save! You stopped it.";

    wrap.innerHTML = `
      ${scoreLabel}
      <div class="gr-pitch">
        <div class="gr-goal">
          ${zones.map((z) => `<button class="gr-zone ${z === s.shot_zone ? "picked" : "disabled"}" disabled>&#9917;</button>`).join("")}
        </div>
        <div class="gr-result-flash show">${resultText}</div>
      </div>
      <button class="gr-next-btn" id="gr-next">Next round &#8594;</button>`;
    document.getElementById("gr-next").addEventListener("click", async (e) => {
      e.target.disabled = true;
      await gameNextRound(gameSession.id);
      lastRenderedPhaseKey = null;
      const fresh = await gameState(gameSession.id);
      if (fresh) { gameSession = fresh; renderGoalRush(); }
    });
  }
}

init();
</script>
</body>
</html>
